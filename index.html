<!DOCTYPE html>
<html>
<head>
  <title>Perimeter & Area ITS</title>
  <style>
    body { font-family: Arial; padding: 30px; }
    .option { margin: 8px 0; }
    button { margin: 10px 5px; padding: 8px 12px; }
    .hidden { display: none; }
  </style>
</head>

<body>

<h2>Grade 6 - Perimeter & Area ITS</h2>

<div id="quiz">
  <h3 id="question"></h3>
  <div id="options"></div>

  <button onclick="submitAnswer()">Submit</button>
  <button onclick="showHint()">Hint</button>

  <p id="hint"></p>
  <p id="feedback"></p>
</div>

<div id="result" class="hidden">
  <h2>Session Summary</h2>
  <p id="summary"></p>
</div>

<script>

// =======================
// QUESTION BANK (NCERT BASED)
// =======================
const questions = [
  {
    question: "What does perimeter measure?",
    options: ["Area", "Boundary length", "Volume", "Height"],
    correct: "Boundary length",
    hints: [
      "Think of walking around a field",
      "It measures outer edge",
      "Total distance around boundary"
    ],
    kc: "KC-1",
    difficulty: "beginner"
  },
  {
    question: "What does area measure?",
    options: ["Boundary", "Surface covered", "Length", "Sides"],
    correct: "Surface covered",
    hints: [
      "Think of tiles on floor",
      "Inside space",
      "Measured in square units"
    ],
    kc: "KC-5",
    difficulty: "beginner"
  },
  {
    question: "A square has side 5 cm. Find its perimeter.",
    options: ["10", "20", "25", "15"],
    correct: "20",
    hints: [
      "Square has 4 equal sides",
      "Add all sides",
      "4 × 5 = 20"
    ],
    kc: "KC-3",
    difficulty: "beginner"
  },
  {
    question: "Rectangle: length = 8, width = 3. Find area.",
    options: ["24", "11", "24 m", "22"],
    correct: "24",
    hints: [
      "Area = length × width",
      "Multiply both",
      "8 × 3"
    ],
    kc: "KC-6",
    difficulty: "beginner"
  },
  {
    question: "Triangle sides are 6, 8, 10. Find perimeter.",
    options: ["24", "48", "14", "80"],
    correct: "24",
    hints: [
      "Add all sides",
      "6 + 8 + 10",
      "Total = 24"
    ],
    kc: "KC-4",
    difficulty: "intermediate"
  },
  {
    question: "Painter paints wall, gardener fences field. Who needs area?",
    options: ["Painter", "Gardener", "Both", "None"],
    correct: "Painter",
    hints: [
      "Painting covers surface",
      "Surface = area",
      "Fencing = perimeter"
    ],
    kc: "KC-8",
    difficulty: "intermediate"
  },
  {
    question: "A rectangle has perimeter 36 and width 7. Find length.",
    options: ["11", "29", "22", "5"],
    correct: "11",
    hints: [
      "P = 2(l + w)",
      "36/2 = 18",
      "18 - 7 = 11"
    ],
    kc: "KC-2",
    difficulty: "intermediate"
  },
  {
    question: "Cost of fencing = ₹40/m. Perimeter = 80m. Total cost?",
    options: ["3200", "1500", "6000", "800"],
    correct: "3200",
    hints: [
      "Cost = perimeter × rate",
      "80 × 40",
      "3200"
    ],
    kc: "KC-9",
    difficulty: "advanced"
  },
  {
    question: "Square area = 64. Find side.",
    options: ["8", "16", "32", "4"],
    correct: "8",
    hints: [
      "Area = side × side",
      "Find sqrt(64)",
      "8 × 8 = 64"
    ],
    kc: "KC-10",
    difficulty: "advanced"
  }
];

// =======================
// STATE VARIABLES
// =======================
let current = 0;
let selected = null;
let hintLevel = 0;

let correct = 0;
let wrong = 0;
let hintsUsed = 0;
let startTime = Date.now();

// =======================
// LOAD QUESTION
// =======================
function loadQuestion() {
  let q = questions[current];
  document.getElementById("question").innerText = q.question;

  let optionsHTML = "";
  q.options.forEach(opt => {
    optionsHTML += `<div class="option">
      <input type="radio" name="option" value="${opt}" onclick="selectOption('${opt}')"> ${opt}
    </div>`;
  });

  document.getElementById("options").innerHTML = optionsHTML;
  document.getElementById("hint").innerText = "";
  document.getElementById("feedback").innerText = "";

  hintLevel = 0;
  selected = null;
}

// =======================
// SELECT OPTION
// =======================
function selectOption(opt) {
  selected = opt;
}

// =======================
// SUBMIT ANSWER
// =======================
function submitAnswer() {
  if (!selected) {
    alert("Select an option");
    return;
  }

  let q = questions[current];

  if (selected === q.correct) {
    correct++;
    document.getElementById("feedback").innerText = "✅ Correct!";
    nextQuestion();
  } else {
    wrong++;
    document.getElementById("feedback").innerText = "❌ Wrong!";
  }
}

// =======================
// HINT SYSTEM
// =======================
function showHint() {
  let q = questions[current];

  if (hintLevel < q.hints.length) {
    document.getElementById("hint").innerText = q.hints[hintLevel];
    hintLevel++;
    hintsUsed++;
  } else {
    document.getElementById("hint").innerText = "No more hints!";
  }
}

// =======================
// NEXT QUESTION
// =======================
function nextQuestion() {
  current++;

  if (current < questions.length) {
    setTimeout(loadQuestion, 500);
  } else {
    endSession();
  }
}

// =======================
// END SESSION
// =======================
function endSession() {
  let timeSpent = Math.floor((Date.now() - startTime) / 1000);

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("summary").innerText = `
    Correct: ${correct}
    Wrong: ${wrong}
    Hints Used: ${hintsUsed}
    Time Spent: ${timeSpent} sec
    Accuracy: ${(correct / (correct + wrong)).toFixed(2)}
  `;
}

// =======================
loadQuestion();
// =======================

</script>

</body>
</html>
